<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>双创智能教练 · 学生端</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <!-- 引入 marked 以支持 markdown 渲染 -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <link rel="stylesheet" href="/static/css/style.css" />
</head>
<body>
  <!-- ══════════════════════════════════════════════════
       登录/新建会话 遮罩
  ══════════════════════════════════════════════════ -->
  <div class="overlay" id="overlay">
    <div class="setup-card">
      <div class="setup-logo">⚡</div>
      <h1 class="setup-title">双创智能教练</h1>
      <p class="setup-desc">
        这不是帮你写商业计划书的 AI。<br />
        这是一个会对你的逻辑漏洞穷追猛打的导师。<br />
        <strong>准备好了吗？</strong>
      </p>
      <div class="setup-form">
        <input
          type="text"
          id="studentIdInput"
          class="setup-input"
          placeholder="请输入你的学号或姓名"
          maxlength="50"
          autocomplete="off"
        />
        <button class="btn-primary" id="startBtn">开始挑战 →</button>
      </div>
      <p class="setup-hint">已有会话？<a href="#" id="resumeLink">输入会话ID恢复</a></p>
      <div class="resume-area hidden" id="resumeArea">
        <input
          type="text"
          id="resumeInput"
          class="setup-input"
          placeholder="输入会话 ID（8位）"
          maxlength="8"
        />
        <button class="btn-secondary" id="resumeBtn">恢复会话</button>
      </div>
      <a href="/teacher" class="teacher-entry">教师端入口 →</a>
    </div>
  </div>

  <!-- ══════════════════════════════════════════════════
       主界面
  ══════════════════════════════════════════════════ -->
  <div class="app-layout hidden" id="appLayout">
    <!-- 顶部导航 -->
    <header class="topbar">
      <div class="topbar-left">
        <span class="topbar-logo">⚡ 双创智能教练</span>
        <div class="phase-badge" id="phaseBadge">价值探测</div>
      </div>
      <div class="topbar-right">
        <span class="round-info">第 <strong id="roundCount">0</strong> 轮</span>
        <span class="session-info" id="sessionInfo"></span>
        <a href="/teacher" class="link-btn">教师端</a>
        <button class="link-btn" id="newSessionBtn">重新开始</button>
      </div>
    </header>

    <div class="main-content">
      <!-- ── 左侧：对话区 ── -->
      <section class="chat-section">
        <div class="messages-wrap" id="messagesWrap">
          <div class="message assistant" id="welcomeMsg">
            <!-- 欢迎消息由 JS 注入 -->
          </div>
        </div>
        <div class="input-wrap" style="position: relative;">
          <!-- 附件预览区域 -->
          <div id="filePreview" style="display:none; padding: 10px 14px; background: rgba(30, 41, 59, 0.7); border-radius: 10px; border: 1px solid #334155; margin-bottom: 8px; align-items: center; justify-content: space-between; gap: 12px; width: fit-content; max-width: 100%;">
            <div style="display:flex; align-items:center; gap: 12px; overflow: hidden;">
               <div id="fileIconBox" style="background: #ef4444; color: white; width: 32px; height: 32px; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 12px; flex-shrink: 0;">PDF</div>
               <div style="display:flex; flex-direction: column; overflow: hidden;">
                 <span id="fileName" style="font-weight: 500; color: #e2e8f0; font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 200px;"></span>
                 <span id="fileSizeHint" style="font-size: 11px; color: #94a3b8;"></span>
               </div>
            </div>
            <button id="removeFileBtn" style="background: rgba(255,255,255,0.1); border: none; cursor: pointer; border-radius: 50%; width: 22px; height: 22px; display: flex; align-items: center; justify-content: center; color: #94a3b8; font-size: 12px; transition: background 0.2s;" title="移除附件" onmouseover="this.style.background='rgba(255,255,255,0.2)'" onmouseout="this.style.background='rgba(255,255,255,0.1)'">✕</button>
          </div>
          <textarea
            id="userInput"
            class="msg-input"
            placeholder="描述你的创业想法，或上传计划书…（Ctrl+Enter 发送）"
            rows="3"
            style="background: transparent;"
          ></textarea>
          <div class="input-actions" style="display:flex; justify-content: space-between; align-items: center; margin-top: 8px;">
            <div style="display:flex; align-items: center; gap: 10px;">
              <input type="file" id="fileUpload" style="display:none;" accept=".pdf,.doc,.docx,.txt" />
              <button id="uploadBtn" style="background: none; border: none; font-size: 20px; color: #94a3b8; cursor: pointer; padding: 4px; transition: color 0.2s; display: flex; align-items: center; justify-content: center;" title="上传附件" onmouseover="this.style.color='#f8fafc'" onmouseout="this.style.color='#94a3b8'">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"></path></svg>
              </button>
            </div>
            <button class="btn-send" id="sendBtn" disabled>
              <span id="sendLabel">发 送</span>
            </button>
          </div>
        </div>
      </section>

      <!-- ── 右侧：分析面板 ── -->
      <aside class="analytics-section">
        <!-- 能力图谱雷达图 -->
        <div class="panel-card">
          <div class="panel-header">
            <span class="panel-icon">🎯</span>
            <span class="panel-title">能力图谱</span>
          </div>
          <div class="radar-wrap">
            <canvas id="radarChart"></canvas>
          </div>
          <div class="scores-grid" id="scoresGrid"></div>
        </div>

        <!-- 逻辑审计结果 -->
        <div class="panel-card" id="fallaciesCard">
          <div class="panel-header">
            <span class="panel-icon">⚠️</span>
            <span class="panel-title">逻辑审计结果</span>
            <span class="badge" id="fallacyCount">0</span>
          </div>
          <div class="fallacies-list" id="fallaciesList">
            <p class="empty-hint">等待教练分析中…</p>
          </div>
        </div>

        <!-- 当前任务 -->
        <div class="panel-card task-highlight hidden" id="taskCard">
          <div class="panel-header">
            <span class="panel-icon">📋</span>
            <span class="panel-title">当前行动任务</span>
          </div>
          <p class="task-text" id="taskText"></p>
        </div>

        <!-- 超图摘要 -->
        <div class="panel-card hidden" id="hypergraphCard">
          <div class="panel-header">
            <span class="panel-icon">🗂️</span>
            <span class="panel-title">项目结构图谱</span>
          </div>
          <pre class="hypergraph-pre" id="hypergraphPre"></pre>
        </div>
      </aside>
    </div>
  </div>

  <script src="/static/js/student.js"></script>
</body>
</html>
